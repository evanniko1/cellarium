name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,hf]"

      # H-4: fail fast on a committed secret (high-signal, known-prefix patterns — Anthropic / AWS / GitHub / Slack
      # tokens + private keys). Dependency-free; gitleaks can be layered on later for entropy-based coverage.
      - name: Secret scan
        run: |
          if git grep -nIE 'sk-ant-[A-Za-z0-9_-]{24,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[0-9A-Za-z-]{10,}' -- .; then
            echo "::error::A potential secret was found in tracked files — remove it from git history and rotate the key."
            exit 1
          fi
          echo "No high-signal secrets in tracked files."

      - name: Lint — ruff
        run: ruff check .

      - name: Test — pytest
        run: pytest

      # Advisory only for now (untyped surfaces remain) — tightening is BACKLOG H-2.
      - name: Type-check — mypy (advisory)
        continue-on-error: true
        run: mypy src/cellarium
