name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check .

      - name: Test — pytest
        run: pytest

      # Advisory only for now (untyped surfaces remain) — tightening is BACKLOG H-2.
      - name: Type-check — mypy (advisory)
        continue-on-error: true
        run: mypy src/cellarium
